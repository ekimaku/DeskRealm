name: Build, validate and release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $baseVersion = (Get-Content VERSION.txt -Raw -Encoding UTF8).Trim()
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
            if ($version -ne $baseVersion) {
              throw "Tag version $version does not match VERSION.txt $baseVersion."
            }
          }
          else {
            $version = "$baseVersion-ci.$env:GITHUB_RUN_NUMBER"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "DeskRealm artifact version: $version"

      - name: Validate tagged release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          $releaseNotes = "docs/release-notes/v$tagVersion.md"
          $releaseControl = "docs/validation/v$tagVersion-release-control.md"
          if (-not (Test-Path -LiteralPath $releaseNotes)) {
            throw "Release notes are missing for tag $env:GITHUB_REF_NAME: $releaseNotes"
          }
          if (-not (Test-Path -LiteralPath $releaseControl)) {
            throw "Release-control validation is missing for tag $env:GITHUB_REF_NAME: $releaseControl"
          }
          $notes = Get-Content -LiteralPath $releaseNotes -Raw -Encoding UTF8
          if ($notes -match '(?im)^>\s*draft|not public until|validation required before publication') {
            throw "Release notes still contain draft/publication-gate wording."
          }

      - name: Restore publish dependencies
        run: dotnet restore src/DeskRealm.App/DeskRealm.App.csproj --runtime win-x64

      - name: Build Release
        run: dotnet build src/DeskRealm.App/DeskRealm.App.csproj --configuration Release --no-restore

      - name: Publish self-contained win-x64 app
        shell: pwsh
        run: |
          $publishDir = Join-Path $pwd 'artifacts/publish/DeskRealm'
          dotnet publish src/DeskRealm.App/DeskRealm.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output $publishDir `
            --no-restore `
            /p:PublishSingleFile=true `
            /p:WindowsAppSDKSelfContained=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishTrimmed=false `
            /p:Version=${{ steps.version.outputs.version }}

          if (-not (Test-Path -LiteralPath (Join-Path $publishDir 'DeskRealm.App.exe'))) {
            throw 'Publish completed without DeskRealm.App.exe.'
          }
          Copy-Item LICENSE $publishDir -Force
          Copy-Item NOTICE $publishDir -Force
          Copy-Item README.md $publishDir -Force
          Copy-Item VERSION.txt $publishDir -Force
          Copy-Item scripts/Restore-Desktop.ps1 $publishDir -Force

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Compress-Archive -Path artifacts/publish/DeskRealm/* -DestinationPath "artifacts/release/DeskRealm-$version-win-x64-portable.zip" -Force

      - name: Create install bundle ZIP
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $bundle = Join-Path $pwd 'artifacts/install-bundle'
          New-Item -ItemType Directory -Force -Path (Join-Path $bundle 'app') | Out-Null
          Copy-Item artifacts/publish/DeskRealm/* (Join-Path $bundle 'app') -Recurse -Force
          Copy-Item scripts/Install-DeskRealm.ps1 $bundle -Force
          Copy-Item scripts/Uninstall-DeskRealm.ps1 $bundle -Force
          Copy-Item LICENSE $bundle -Force
          Copy-Item NOTICE $bundle -Force
          @"
          DeskRealm install bundle
          ========================

          1. Review Install-DeskRealm.ps1.
          2. Open PowerShell in this folder.
          3. Run:
             powershell -ExecutionPolicy Bypass -File .\Install-DeskRealm.ps1
          "@ | Set-Content -Encoding UTF8 (Join-Path $bundle 'README-INSTALL.txt')
          Compress-Archive -Path "$bundle/*" -DestinationPath "artifacts/release/DeskRealm-$version-win-x64-install-bundle.zip" -Force

      - name: Create SHA-256 checksums
        shell: pwsh
        run: |
          $checksums = Get-ChildItem artifacts/release/*.zip | Sort-Object Name | ForEach-Object {
            $hash = Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant())  $($_.Name)"
          }
          $checksums | Set-Content -Encoding ASCII artifacts/release/SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeskRealm-windows-artifacts-${{ steps.version.outputs.version }}
          path: artifacts/release/*
          retention-days: 14

  release:
    name: Create GitHub release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: DeskRealm-windows-artifacts-*
          path: artifacts/release
          merge-multiple: true

      - name: Create GitHub Release from tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release create $tag artifacts/release/* --title "DeskRealm $tag" --notes-file "docs/release-notes/$tag.md"
