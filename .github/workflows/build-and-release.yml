name: Build and release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            $version = '0.5.1-dev'
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
          Write-Host "DeskRealm version: $version"

      - name: Restore
        run: dotnet restore DeskRealm.sln

      - name: Build
        run: dotnet build DeskRealm.sln --configuration Release --no-restore

      - name: Publish self-contained win-x64 app
        shell: pwsh
        run: |
          $publishDir = Join-Path $pwd 'artifacts/publish/DeskRealm'
          dotnet publish src/DeskRealm.App/DeskRealm.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output $publishDir `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishTrimmed=false `
            /p:Version=${{ steps.version.outputs.version }}

          Copy-Item LICENSE $publishDir -Force
          Copy-Item NOTICE $publishDir -Force
          Copy-Item README.md $publishDir -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $publishDir 'docs') | Out-Null
          Copy-Item docs/SAFETY_AND_PRIVACY.md (Join-Path $publishDir 'docs') -Force
          Copy-Item scripts/Restore-Desktop.ps1 $publishDir -Force

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          Compress-Archive -Path artifacts/publish/DeskRealm/* -DestinationPath "artifacts/release/DeskRealm-$version-win-x64-portable.zip" -Force

      - name: Create install bundle ZIP
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $bundle = Join-Path $pwd 'artifacts/install-bundle'
          New-Item -ItemType Directory -Force -Path (Join-Path $bundle 'app') | Out-Null
          Copy-Item artifacts/publish/DeskRealm/* (Join-Path $bundle 'app') -Recurse -Force
          Copy-Item scripts/Install-DeskRealm.ps1 $bundle -Force
          Copy-Item scripts/Uninstall-DeskRealm.ps1 $bundle -Force
          Copy-Item LICENSE $bundle -Force
          Copy-Item NOTICE $bundle -Force
          @"
          DeskRealm install bundle
          ========================

          1. Review Install-DeskRealm.ps1.
          2. Open PowerShell in this folder.
          3. Run:
             powershell -ExecutionPolicy Bypass -File .\Install-DeskRealm.ps1

          This installs DeskRealm to:
            %LOCALAPPDATA%\Programs\DeskRealm

          To uninstall later:
             powershell -ExecutionPolicy Bypass -File .\Uninstall-DeskRealm.ps1
          "@ | Set-Content -Encoding UTF8 (Join-Path $bundle 'README-INSTALL.txt')
          Compress-Archive -Path "$bundle/*" -DestinationPath "artifacts/release/DeskRealm-$version-win-x64-install-bundle.zip" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeskRealm-windows-artifacts
          path: artifacts/release/*.zip

      - name: Create GitHub Release from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $notesPath = "docs/release-notes/$tag.md"
          if (Test-Path $notesPath) {
            gh release create $tag artifacts/release/*.zip --title "DeskRealm $tag" --notes-file $notesPath
          } else {
            gh release create $tag artifacts/release/*.zip --title "DeskRealm $tag" --notes "Automated DeskRealm release. See CHANGELOG.md for details."
          }
